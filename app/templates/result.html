<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Review Result | CodeReview Assist Pro AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-11">

            <div class="card shadow-lg border-0">

                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">

                    <h3 class="mb-0">
                        🤖 AI Code Review Report
                    </h3>

                    <span class="badge bg-light text-dark">
                        {{ review.language|upper }}
                    </span>

                </div>

                <div class="card-body">

                    <div class="row text-center mb-4">

                        <div class="col-md-4">

                            <div class="card bg-primary text-white">

                                <div class="card-body">

                                    <h6>Review ID</h6>

                                    <h3>#{{ review.id }}</h3>

                                </div>

                            </div>

                        </div>

                        <div class="col-md-4">

                            <div class="card bg-success text-white">

                                <div class="card-body">

                                    <h6>Language</h6>

                                    <h3>{{ review.language|upper }}</h3>

                                </div>

                            </div>

                        </div>

                        <div class="col-md-4">

                            <div class="card bg-dark text-white">

                                <div class="card-body">

                                    <h6>Generated</h6>

                                    <small>{{ review.created_at }}</small>

                                </div>

                            </div>

                        </div>

                    </div>

                    <hr>

                    <h4 class="mb-3">
                        🤖 AI Analysis
                    </h4>

                    <pre class="bg-dark text-light p-4 rounded"
style="white-space: pre-wrap;
font-size:15px;
line-height:1.6;
max-height:650px;
overflow:auto;">{{ review.review_result }}</pre>

                </div>

                <div class="card-footer">

                    <div class="d-flex flex-wrap gap-2">

                        <a href="{{ url_for('review.review_code') }}"
                           class="btn btn-primary">

                            🔄 Review Again

                        </a>

                        <a href="{{ url_for('review.history') }}"
                           class="btn btn-success">

                            📜 History

                        </a>

                        <a href="{{ url_for('pdf.review_pdf', review_id=review.id) }}"
                           class="btn btn-danger">

                            📄 Download PDF

                        </a>

                        <a href="{{ url_for('auth.dashboard') }}"
                           class="btn btn-secondary">

                            🏠 Dashboard

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
