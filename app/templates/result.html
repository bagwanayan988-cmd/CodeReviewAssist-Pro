<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Review Result | CodeReview Assist Pro AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-11">

            <div class="card shadow">

                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">

                    <h3 class="mb-0">
                        ✅ AI Code Review Result
                    </h3>

                    <span class="badge bg-light text-dark">
                        {{ review.language|upper }}
                    </span>

                </div>

                <div class="card-body">

                    <div class="row mb-4">

                        <div class="col-md-6">

                            <strong>Review ID</strong><br>

                            #{{ review.id }}

                        </div>

                        <div class="col-md-6 text-md-end">

                            <strong>Generated On</strong><br>

                            {{ review.created_at }}

                        </div>

                    </div>

                    <hr>

                    <h5 class="mb-3">
                        🤖 AI Review
                    </h5>

                    <pre class="bg-dark text-light p-4 rounded border"
style="white-space: pre-wrap;
word-wrap: break-word;
font-size:15px;
line-height:1.6;
max-height:700px;
overflow:auto;">{{ review.review_result }}</pre>

                </div>

                <div class="card-footer">

                    <div class="d-flex gap-2 flex-wrap">

                        <a
                            href="{{ url_for('review.review_code') }}"
                            class="btn btn-primary">

                            🔄 Review Another Code

                        </a>

                        <a
                            href="{{ url_for('review.history') }}"
                            class="btn btn-outline-success">

                            📜 Review History

                        </a>

                        <a
                            href="{{ url_for('auth.dashboard') }}"
                            class="btn btn-outline-secondary">

                            🏠 Dashboard

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
