{% extends "base.html" %}

{% block title %}Resume ATS Analyzer{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h3 class="mb-0">
                        📄 AI Resume ATS Analyzer
                    </h3>

                </div>

                <div class="card-body">

                    <p class="text-muted">
                        Upload your resume (PDF only) and receive an AI-powered ATS score with improvement suggestions.
                    </p>

                    <form method="POST"
                          enctype="multipart/form-data">

                        <div class="mb-3">

                            <label class="form-label">

                                Select Resume (PDF)

                            </label>

                            <input
                                type="file"
                                name="resume"
                                class="form-control"
                                accept=".pdf"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            🤖 Analyze Resume

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
