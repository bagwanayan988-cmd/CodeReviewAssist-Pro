{% extends "base.html" %}

{% block title %}GitHub Analysis{% endblock %}

{% block content %}

<div class="container mt-5">

<div class="card shadow-lg">

<div class="card-header bg-success text-white">

<h2>🐙 GitHub Repository Analysis</h2>

</div>

<div class="card-body">

<h5>Repository</h5>

<div class="alert alert-secondary">

{{ repo_url }}

</div>

<hr>

<h4>🤖 AI Review</h4>

<pre class="bg-light border rounded p-4"
style="white-space:pre-wrap;font-size:15px;">{{ review }}</pre>

<div class="mt-4 d-flex flex-wrap gap-2">

<a href="{{ url_for('github.analyze_github') }}"
class="btn btn-primary">

Analyze Another Repository

</a>

<a href="{{ url_for('github.history') }}"
class="btn btn-dark">

📜 History

</a>

<a href="{{ url_for('pdf.github_pdf', review_id=review_id) }}"
class="btn btn-danger">

📄 Download PDF

</a>

<a href="{{ url_for('auth.dashboard') }}"
class="btn btn-secondary">

Dashboard

</a>

</div>

</div>

</div>

</div>

{% endblock %}
